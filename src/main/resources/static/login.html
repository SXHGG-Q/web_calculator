<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>用户登录</title>
    <style>
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 20px;
            border: 1px solid #eee;
            border-radius: 8px;
            text-align: center;
        }
        input {
            width: 80%;
            padding: 8px;
            margin: 10px 0;
        }
        button {
            padding: 8px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        #msg {
            color: red;
            margin: 10px 0;
        }
    </style>
</head>
<body>
<div class="login-container">
    <h2>科学计算器 - 用户登录</h2>
    <input type="text" id="username" placeholder="请输入用户名">
    <br>
    <input type="password" id="password" placeholder="请输入密码">
    <br>
    <button onclick="login()">登录</button>
    <button onclick="register()">注册</button>
    <div id="msg"></div>
    <a href="index.html" style="margin-top: 20px; display: block;">游客模式（无数据存储）</a>
</div>

<script>
    // 注册功能
    function register() {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();
        if (!username || !password) {
            document.getElementById("msg").innerText = "用户名/密码不能为空";
            return;
        }
        fetch(`/register?username=${username}&password=${password}`)
            .then(res => res.text())
            .then(data => {
                document.getElementById("msg").innerText = data;
            });
    }

    // 登录功能
    function login() {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();
        if (!username || !password) {
            document.getElementById("msg").innerText = "用户名/密码不能为空";
            return;
        }
        fetch(`/login?username=${username}&password=${password}`)
            .then(res => res.text())
            .then(data => {
                if (data.startsWith("登录成功")) {
                    // 提取用户ID，存储到本地（LocalStorage）
                    const userId = data.split("|")[1];
                    localStorage.setItem("loginUserId", userId);
                    localStorage.setItem("loginUsername", username);
                    // 跳转到计算器主页面
                    window.location.href = "index.html";
                } else {
                    document.getElementById("msg").innerText = data;
                }
            });
    }
</script>
</body>
</html>
