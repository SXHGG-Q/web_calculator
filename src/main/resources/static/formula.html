<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>自定义公式编辑器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            max-width: 700px;
            margin: 40px auto;
            padding: 30px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #2c3e50;
        }
        input {
            width: 100%;
            padding: 14px;
            font-size: 18px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #ddd;
        }
        .panel {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        .panel button {
            padding: 14px;
            font-size: 16px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .action {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }
        .action button {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            color: white;
            cursor: pointer;
        }
        .save { background: #28a745; }
        .back { background: #6c757d; }
        .unknown { background: #6610f2; }
        .backspace { background: #dc3545; }
    </style>
</head>
<body>
<h2>科学公式编辑器</h2>
<div id="userInfo" style="margin-bottom: 20px;"></div>
<button onclick="logout()" style="position: absolute; top: 20px; right: 20px;">登出</button>
<input id="formulaName" placeholder="输入公式名称（如：勾股定理、梯形面积）">
<input id="formulaInput" readonly placeholder="点击按钮拼接公式（x1-x9为未知数）">

<div class="panel">
    <button class="unknown" onclick="append('x1')">x1</button>
    <button class="unknown" onclick="append('x2')">x2</button>
    <button class="unknown" onclick="append('x3')">x3</button>
    <button class="unknown" onclick="append('x4')">x4</button>
    <button class="unknown" onclick="append('x5')">x5</button>
    <button class="unknown" onclick="append('x6')">x6</button>
    <button class="unknown" onclick="append('x7')">x7</button>
    <button class="unknown" onclick="append('x8')">x8</button>
    <button class="unknown" onclick="append('x9')">x9</button>

    <button onclick="append('(')"> ( </button>
    <button onclick="append(')')"> )</button>
    <button onclick="append('.')">.</button>

    <button onclick="append('+')">+</button>
    <button onclick="append('-')">-</button>
    <button onclick="append('*')">*</button>
    <button onclick="append('/')">/</button>
    <button onclick="append('%')">%</button>

    <button onclick="append('Math.pow(')">pow(</button>
    <button onclick="append('Math.sqrt(')">sqrt(</button>
    <button onclick="append('Math.log(')">log(</button>
    <button onclick="append('Math.sin(')">sin(</button>
    <button onclick="append('Math.cos(')">cos(</button>
    <button onclick="append('Math.tan(')">tan(</button>
    <button onclick="append('Math.ceil(')">ceil(</button>
    <button onclick="append('Math.floor(')">floor(</button>
    <button onclick="append('Math.round(')">round(</button>
    <button onclick="append('Math.isEqual(')">isEqual(</button>

    <button class="backspace" onclick="backspace()">← 退格</button>
    <button onclick="clearInput()">清空</button>
</div>

<div class="action">
    <button class="save" onclick="saveFormula()">保存公式</button>
    <button class="back" onclick="location.href='index.html'">返回计算器</button>
</div>

<script>
    let input = document.getElementById("formulaInput");

    //页面加载时检验用户是否登录
    window.onload = function() {
        const userId = localStorage.getItem('loginUserId');
        const username = localStorage.getItem('loginUsername');
        if (!userId || !username) {
            alert("请先登录后再访问公式编辑器！");
            window.location.href = "login.html";
        }else{
            // 登录成功，设置用户ID
            document.getElementById("userInfo").innerText = `当前用户：${username}`;
        }
    }

    function logout() {
        localStorage.removeItem("loginUserId");
        localStorage.removeItem("loginUsername");
        window.location.href = "login.html";
    }
    function append(str) {
        input.value += str;
    }

    // 退格：删除最后一个字符
    function backspace() {
        input.value = input.value.substring(0, input.value.length - 1);
    }

    function clearInput() {
        input.value = "";
    }

    async function saveFormula() {
        try { // 新增：捕获网络/接口异常
            // 1. 获取输入值（保留你的原有逻辑）
            let name = document.getElementById("formulaName").value.trim();
            let content = input.value.trim();

            // 2. 基础非空校验（保留）
            if (!name || !content) {
                alert("请填写完整公式名称和公式内容");
                return;
            }

            // 3. 核心修复：获取登录用户ID（必须传）
            const userId = localStorage.getItem("loginUserId");
            if (!userId) { // 未登录则提示并跳转
                alert("请先登录后再保存公式！");
                window.location.href = "login.html"; // 跳登录页
                return;
            }

            // 4. 拼接URL：新增user_id参数（关键！）
            const url = `/saveFormula?name=${encodeURIComponent(name)}&content=${encodeURIComponent(content)}&user_id=${userId}`;

            // 5. 发起请求并校验响应状态
            let res = await fetch(url);
            if (!res.ok) { // 捕获400/500等HTTP错误
                throw new Error(`请求失败：${res.status} ${res.statusText}`);
            }

            // 6. 处理响应结果
            let text = await res.text();
            alert(text);
            if (text.includes("成功")) { // 保存成功后清空
                clearInput();
            }
        } catch (e) { // 捕获所有异常
            console.error("保存公式失败：", e);
            alert("保存公式出错：" + e.message);
        }
    }
</script>
</body>
</html>
