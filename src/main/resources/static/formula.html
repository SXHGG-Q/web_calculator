<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>自定义公式编辑器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            max-width: 700px;
            margin: 40px auto;
            padding: 30px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #2c3e50;
        }
        input {
            width: 100%;
            padding: 14px;
            font-size: 18px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #ddd;
        }
        .panel {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        .panel button {
            padding: 14px;
            font-size: 16px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .action {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }
        .action button {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            color: white;
            cursor: pointer;
        }
        .save { background: #28a745; }
        .back { background: #6c757d; }
        .unknown { background: #6610f2; }
        .backspace { background: #dc3545; }
    </style>
</head>
<body>
<h2>科学公式编辑器</h2>
<input id="formulaName" placeholder="输入公式名称（如：勾股定理、梯形面积）">
<input id="formulaInput" readonly placeholder="点击按钮拼接公式（x1-x9为未知数）">

<div class="panel">
    <button class="unknown" onclick="append('x1')">x1</button>
    <button class="unknown" onclick="append('x2')">x2</button>
    <button class="unknown" onclick="append('x3')">x3</button>
    <button class="unknown" onclick="append('x4')">x4</button>
    <button class="unknown" onclick="append('x5')">x5</button>
    <button class="unknown" onclick="append('x6')">x6</button>
    <button class="unknown" onclick="append('x7')">x7</button>
    <button class="unknown" onclick="append('x8')">x8</button>
    <button class="unknown" onclick="append('x9')">x9</button>

    <button onclick="append('(')"> ( </button>
    <button onclick="append(')')"> )</button>
    <button onclick="append('.')">.</button>

    <button onclick="append('+')">+</button>
    <button onclick="append('-')">-</button>
    <button onclick="append('*')">*</button>
    <button onclick="append('/')">/</button>
    <button onclick="append('%')">%</button>

    <button onclick="append('Math.pow(')">pow(</button>
    <button onclick="append('Math.sqrt(')">sqrt(</button>
    <button onclick="append('Math.log(')">log(</button>
    <button onclick="append('Math.sin(')">sin(</button>
    <button onclick="append('Math.cos(')">cos(</button>
    <button onclick="append('Math.tan(')">tan(</button>
    <button onclick="append('Math.ceil(')">ceil(</button>
    <button onclick="append('Math.floor(')">floor(</button>
    <button onclick="append('Math.round(')">round(</button>
    <button onclick="append('Math.isEqual(')">isEqual(</button>

    <button class="backspace" onclick="backspace()">← 退格</button>
    <button onclick="clearInput()">清空</button>
</div>

<div class="action">
    <button class="save" onclick="saveFormula()">保存公式</button>
    <button class="back" onclick="location.href='index.html'">返回计算器</button>
</div>

<script>
    let input = document.getElementById("formulaInput");

    function append(str) {
        input.value += str;
    }

    // 退格：删除最后一个字符
    function backspace() {
        input.value = input.value.substring(0, input.value.length - 1);
    }

    function clearInput() {
        input.value = "";
    }

    // 保存公式函数（修复400错误：参数名必须为name和content）
    async function saveFormula() {
        // 1. 获取输入值（这里的变量名可以随便取，但传参时必须叫name和content）
        const formulaName = document.getElementById("formulaNameInput").value.trim();
        const formulaContent = document.getElementById("formulaContentInput").value.trim();

        // 2. 基础校验（防止传空值）
        if (!formulaName) {
            alert("公式名称不能为空！");
            return;
        }
        if (!formulaContent) {
            alert("公式内容不能为空！");
            return;
        }

        try {
            // 3. 核心修复：URL中的参数名必须是name和content（与后端完全匹配）
            // 格式：/saveFormula?name=xxx&content=xxx
            const url = `/saveFormula?name=${encodeURIComponent(formulaName)}&content=${encodeURIComponent(formulaContent)}`;

            const res = await fetch(url);
            const data = await res.text(); // 后端返回的是字符串

            if (data.includes("成功")) {
                alert("保存公式成功！");
                window.location.href = "index.html"; // 跳转回计算器
            } else {
                alert("保存失败：" + data);
            }
        } catch (e) {
            console.error("保存公式报错：", e);
            alert("保存公式网络错误，请稍后重试！");
        }
    }
</script>
</body>
</html>
