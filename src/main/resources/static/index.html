<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>科学计算器</title>
    <script>
        // 先检查是否登录，未登录则跳转
        window.onload = function() {
            const userId = localStorage.getItem("loginUserId");
            if (!userId) { // 未登录→跳登录页
                window.location.href = "login.html";
            }
            // 已登录→正常显示计算器（不跳转）
        };
    </script>
    <style>
        .container {
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
        }
        #inputContainer {
            margin: 15px 0;
        }
        #inputContainer input {
            margin: 5px;
            padding: 8px;
            width: 200px;
        }
        button {
            margin: 5px;
            padding: 8px 12px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
        }
        button:hover {
            background-color: #0056b3;
        }
        #result {
            margin: 20px 0;
            font-size: 20px;
            color: #007bff;
            min-height: 24px;
        }
        #history {
            text-align: left;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #eee;
            padding: 10px;
            border-radius: 4px;
        }
        .formula-input {
            margin: 10px 0;
            padding: 8px;
            width: 200px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>科学计算器</h1>

    <!-- 动态未知数输入框区域 -->
    <div id="inputContainer">
        <div><input type="number" id="x1-input" placeholder="请输入 x1 的值" step="any"></div>
        <div><input type="number" id="x2-input" placeholder="请输入 x2 的值" step="any"></div>
    </div>

    <!-- 控制按钮 -->
    <button onclick="addInput()">添加未知数(x)</button>
    <button onclick="removeInput()">删除最后一个</button>

    <hr>
    <!-- 基础运算区 -->
    <h3>基础/科学运算</h3>
    <button onclick="calc('add')">加法</button>
    <button onclick="calc('sub')">减法</button>
    <button onclick="calc('mul')">乘法</button>
    <button onclick="calc('div')">除法</button>
    <button onclick="calc('pow')">次方</button>
    <button onclick="calc('sqrt')">开方</button>
    <button onclick="calc('log')">对数</button>
    <button onclick="calc('sin')">正弦</button>
    <button onclick="calc('cos')">余弦</button>
    <button onclick="calc('tan')">正切</button>

    <hr>
    <!-- 自定义公式区 -->
    <h3>自定义公式</h3>
    <input type="text" id="formulaName" class="formula-input" placeholder="输入公式名称">
    <button onclick="calcFormula()">计算公式</button>
    <button onclick="listFormulas()">查看公式库</button>
    <button onclick="window.open('/formula.html')">创建公式</button>

    <hr>
    <!-- 历史记录区 -->
    <h3>历史记录</h3>
    <button onclick="saveRecord()">保存当前记录</button>
    <button onclick="queryRecords()">查看历史</button>

    <!-- 结果展示 -->
    <div id="result">结果：</div>
    <pre id="history"></pre>
</div>

<script>
    // 核心变量：当前最大未知数编号
    let maxVar = 2;
    // 存储当前计算的原始表达式（用于历史记录）
    let currentExpression = '';

    //页面加载时检验用户是否登录
    window.onload = function() {
        const userId = localStorage.getItem('loginUserId');
        const username = localStorage.getItem('loginUsername');
        if (!userId || !username) {
            alert("未登录，进入游客模式（无法保存记录/公式）");
        }else{
            // 登录成功，设置用户ID
            document.getElementById("userInfo").innerText = `当前用户：${username}`;
        }
    }

    // ===================== 1. 动态输入框控制 =====================
    // 添加未知数（最多9个）
    function addInput() {
        if (maxVar >= 9) {
            alert("最多支持 9 个未知数！");
            return;
        }
        maxVar++;
        const container = document.getElementById("inputContainer");
        const div = document.createElement("div");
        div.innerHTML = `<input type="number" id="x${maxVar}-input" placeholder="请输入 x${maxVar} 的值" step="any">`;
        container.appendChild(div);
    }

    // 删除未知数（最少1个）
    function removeInput() {
        if (maxVar <= 1) {
            alert("至少保留 1 个未知数！");
            return;
        }
        const container = document.getElementById("inputContainer");
        container.removeChild(container.lastChild);
        maxVar--;
    }

    // 获取指定编号的x值（转Number类型，默认0）
    function getX(n) {
        const val = document.getElementById(`x${n}-input`)?.value;
        return val ? Number(val) : 0;
    }

    // ===================== 2. 基础运算 =====================
    async function calc(type) {
        try {
            // 获取运算参数（统一转Number）
            const x1 = getX(1);
            const x2 = getX(2);
            let url = '';
            let exp = '';

            // 根据运算类型拼接接口URL和表达式（适配后端参数名 angle1/angle2）
            switch (type) {
                case 'add':
                    url = `/add?angle1=${x1}&angle2=${x2}`;
                    exp = `${x1} + ${x2}`;
                    break;
                case 'sub':
                    url = `/sub?angle1=${x1}&angle2=${x2}`;
                    exp = `${x1} - ${x2}`;
                    break;
                case 'mul':
                    url = `/mul?angle1=${x1}&angle2=${x2}`;
                    exp = `${x1} × ${x2}`;
                    break;
                case 'div':
                    if (x2 === 0) {
                        alert('除数不能为0！');
                        return;
                    }
                    url = `/div?angle1=${x1}&angle2=${x2}`;
                    exp = `${x1} ÷ ${x2}`;
                    break;
                case 'pow':
                    url = `/pow?angle1=${x1}&angle2=${x2}`;
                    exp = `${x1} ^ ${x2}`;
                    break;
                case 'sqrt':
                    url = `/sqrt?angle1=${x1}&angle2=${x2}`;
                    exp = `${x1} 的 ${x2} 次方根`;
                    break;
                case 'log':
                    url = `/log?angle1=${x1}&angle2=${x2}`;
                    exp = `以 ${x2} 为底 ${x1} 的对数`;
                    break;
                case 'sin':
                    url = `/sin?angle1=${x1}`;
                    exp = `sin(${x1})`;
                    break;
                case 'cos':
                    url = `/cos?angle1=${x1}`;
                    exp = `cos(${x1})`;
                    break;
                case 'tan':
                    url = `/tan?angle1=${x1}`;
                    exp = `tan(${x1})`;
                    break;
                default:
                    alert('不支持的运算类型！');
                    return;
            }

            // 保存当前表达式（用于后续保存历史）
            currentExpression = exp;

            // 调用后端接口
            const res = await fetch(url);
            if (!res.ok) throw new Error('接口请求失败');

            const result = await res.text();
            document.getElementById("result").innerText = `结果：${result}`;
        } catch (e) {
            console.error('计算失败：', e);
            document.getElementById("result").innerText = `结果：计算失败（${e.message}）`;
        }
    }

    // ===================== 3. 自定义公式运算 =====================
    async function calcFormula() {
        const formulaName = document.getElementById("formulaName").value.trim();
        if (!formulaName) {
            alert("请输入公式名称！");
            return;
        }

        // 收集所有x1~x9参数
        let url = `/calcFormula?name=${encodeURIComponent(formulaName)}`;
        let expParams = [];
        for (let i = 1; i <= maxVar; i++) {
            const val = getX(i);
            url += `&x${i}=${val}`;
            expParams.push(`x${i}=${val}`);
        }

        // 保存当前公式表达式
        currentExpression = `公式[${formulaName}](${expParams.join(', ')})`;

        try {
            const res = await fetch(url);
            if (!res.ok) throw new Error('公式计算接口请求失败');

            const result = await res.text();
            document.getElementById("result").innerText = `结果：${result}`;
        } catch (e) {
            console.error('公式计算失败：', e);
            document.getElementById("result").innerText = `结果：计算失败（${e.message}）`;
        }
    }

    // 查看公式列表
    async function listFormulas() {
        try {
            const res = await fetch("/listFormulas");
            if (!res.ok) throw new Error('获取公式列表失败');

            const text = await res.text();
            document.getElementById("history").innerText = text;
        } catch (e) {
            document.getElementById("history").innerText = `获取公式失败：${e.message}`;
        }
    }

    // ===================== 4. 历史记录 =====================
    async function saveRecord() {
        const userId = localStorage.getItem("loginUserId");
        if (!userId) {
            alert("请先登录！");
            window.location.href = "login.html";
            return;
        }
        const resultText = document.getElementById("result").innerText;
        if (!resultText || resultText === '结果：' || resultText.includes('计算失败')) {
            alert('暂无有效结果可保存！');
            return;
        }
        const result = resultText.replace('结果：', '').trim();
        if (isNaN(Number(result)) && !/^公式/.test(currentExpression)) {
            alert('结果不是有效数值，无法保存！');
            return;
        }
        try {
            // URL中添加user_id参数
            const url = `/save?expression=${encodeURIComponent(currentExpression)}&result=${result}&user_id=${userId}`;
            const res = await fetch(url);
            if (!res.ok) throw new Error('保存失败');
            alert("保存成功！");
        } catch (e) {
            console.error('保存记录失败：', e);
            alert(`保存失败：${e.message}`);
        }
    }

    async function queryRecords() {
        try {
            const res = await fetch("/query");
            if (!res.ok) throw new Error('获取历史记录失败');

            const text = await res.text();
            document.getElementById("history").innerText = text;
        } catch (e) {
            document.getElementById("history").innerText = `获取历史记录失败：${e.message}`;
        }
    }

    function logout() {
        localStorage.removeItem("loginUserId");
        localStorage.removeItem("loginUsername");
        window.location.href = "login.html";
    }
</script>
</body>
</html>
